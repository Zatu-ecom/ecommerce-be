openapi: 3.0.3
info:
  title: Product & Variant Media Integration API
  version: 0.2.0
  description: |
    Contract for attaching, reading, updating, and removing File module media from
    Product and Variant responses.

    **v0.2.0 changes (2026-05-21):**
    - Added variant media endpoints under `/product/{productId}/variant/{variantId}/media`.
    - Removed deprecated `images` array from Product and Variant schemas.
    - Added `VariantMedia`, `AttachVariantMediaRequest`, `UpdateVariantMediaRequest` schemas.
    - Added `VariantId` path parameter.
servers:
  - url: /api
paths:
  /product/{productId}:
    get:
      summary: Get product detail with media
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SellerId'
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail includes ordered media summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /product:
    get:
      summary: List products with media
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SellerId'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Product list includes media summaries for each product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /product/{productId}/media:
    post:
      summary: Attach uploaded media to a product
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ProductId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachProductMediaRequest'
      responses:
        '201':
          description: Media link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductMediaResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /product/{productId}/variant/{variantId}/media:
    post:
      summary: Attach uploaded media to a variant
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachVariantMediaRequest'
      responses:
        '201':
          description: Variant media link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariantMediaResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /product/{productId}/variant/{variantId}/media/{fileId}:
    patch:
      summary: Update variant media metadata
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
        - $ref: '#/components/parameters/FileId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVariantMediaRequest'
      responses:
        '200':
          description: Variant media metadata updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariantMediaResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Remove variant media and attempt underlying file cleanup
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantId'
        - $ref: '#/components/parameters/FileId'
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Variant media link removed.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /product/{productId}/media/{fileId}:
    patch:
      summary: Update product media metadata
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/FileId'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductMediaRequest'
      responses:
        '200':
          description: Media metadata updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductMediaResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Remove product media and attempt underlying file cleanup
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/FileId'
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Product media link removed.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 1
    SellerId:
      name: X-Seller-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 1
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    VariantId:
      name: variantId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    AttachProductMediaRequest:
      type: object
      required:
        - fileId
      properties:
        fileId:
          type: string
          format: uuid
        isPrimary:
          type: boolean
          default: false
        displayOrder:
          type: integer
          minimum: 0
          default: 0
    UpdateProductMediaRequest:
      type: object
      properties:
        isPrimary:
          type: boolean
        displayOrder:
          type: integer
          minimum: 0
      minProperties: 1
    ProductMedia:
      type: object
      required:
        - fileId
        - url
        - isPrimary
        - displayOrder
      properties:
        fileId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        isPrimary:
          type: boolean
        displayOrder:
          type: integer
          minimum: 0
    VariantMedia:
      type: object
      required:
        - fileId
        - url
        - isPrimary
        - displayOrder
      properties:
        fileId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        isPrimary:
          type: boolean
        displayOrder:
          type: integer
          minimum: 0
    AttachVariantMediaRequest:
      type: object
      required:
        - fileId
      properties:
        fileId:
          type: string
          format: uuid
        isPrimary:
          type: boolean
          default: false
        displayOrder:
          type: integer
          minimum: 0
          default: 0
    UpdateVariantMediaRequest:
      type: object
      properties:
        isPrimary:
          type: boolean
        displayOrder:
          type: integer
          minimum: 0
      minProperties: 1
    Variant:
      type: object
      description: Variant response with media field. The legacy `images` field has been removed.
      properties:
        id:
          type: integer
        productId:
          type: integer
        sku:
          type: string
        price:
          type: number
        allowPurchase:
          type: boolean
        isPopular:
          type: boolean
        isDefault:
          type: boolean
        media:
          type: array
          items:
            $ref: '#/components/schemas/VariantMedia'
        selectedOptions:
          type: array
          items:
            type: object
      required:
        - id
        - productId
        - media
    Product:
      type: object
      description: Product response with additive media field. The legacy `images` field has been removed from variant sub-objects.
      properties:
        id:
          type: integer
        name:
          type: string
        sellerId:
          type: integer
        media:
          type: array
          items:
            $ref: '#/components/schemas/ProductMedia'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'
      required:
        - id
        - name
        - media
    Pagination:
      type: object
      properties:
        currentPage:
          type: integer
        totalPages:
          type: integer
        totalItems:
          type: integer
        itemsPerPage:
          type: integer
        hasNext:
          type: boolean
        hasPrev:
          type: boolean
    ProductListData:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          $ref: '#/components/schemas/Pagination'
    ProductResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/Product'
    ProductListResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/ProductListData'
    ProductMediaResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/ProductMedia'
    VariantMediaResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/VariantMedia'
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        code:
          type: string
  responses:
    BadRequest:
      description: Invalid request, missing correlation ID, or invalid file reference.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Caller is not allowed to manage this product.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Product or product media link was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Media file is already attached to this product.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
